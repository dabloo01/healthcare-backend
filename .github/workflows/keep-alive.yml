name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          curl -s https://healthcare-backend-4-bjea.onrender.com/api/dashboard > /dev/null
          echo "Pinged backend successfully"
